name: trips_app
description: Flutter Trips Application
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.0
  
  # Navigation
  go_router: ^12.0.0
  
  # UI
  cupertino_icons: ^1.0.2
  
  # Utils
  intl: ^0.19.0

  # WebSocket (cross-platform)
  web_socket_channel: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
